<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFinance | Gestor Pessoal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SmartFinance</h1>
            <div class="balance-container">
                <h4>O Teu Saldo</h4>
                <h1 id="balance">€ 0.00</h1>
            </div>
        </header>

        <div class="inc-exp-container">
            <div>
                <h4>Receitas</h4>
                <p id="money-plus" class="money plus">+€ 0.00</p>
            </div>
            <div>
                <h4>Despesas</h4>
                <p id="money-minus" class="money minus">-€ 0.00</p>
            </div>
        </div>

        <h3>Histórico</h3>
        <ul id="list" class="list"></ul>

        <h3>Nova Transação</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Descrição</label>
                <input type="text" id="text" placeholder="Ex: Salário, Jantar..." />
            </div>
            <div class="form-control">
                <label for="amount">Valor <br> (negativo = despesa, positivo = receita)</label>
                <input type="number" id="amount" placeholder="Ex: -20 ou 1500" />
            </div>
            <button class="btn">Adicionar Transação</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
