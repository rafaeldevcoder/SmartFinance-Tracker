<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro | Gestão Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <span class="logo"><i class="fas fa-wallet"></i> Finanças<b>Pro</b></span>
            <div class="user-info">
                <span id="current-date"></span>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <section class="summary">
            <div class="card total">
                <h3>Saldo Atual</h3>
                <h1 id="balance">0,00€</h1>
            </div>
            <div class="card income">
                <div class="card-icon"><i class="fas fa-arrow-up"></i></div>
                <div>
                    <p>Receitas</p>
                    <h2 id="money-plus">+ 0,00€</h2>
                </div>
            </div>
            <div class="card expense">
                <div class="card-icon"><i class="fas fa-arrow-down"></i></div>
                <div>
                    <p>Despesas</p>
                    <h2 id="money-minus">- 0,00€</h2>
                </div>
            </div>
        </section>

        <section class="content-grid">
            <div class="card form-container">
                <h3>Nova Transação</h3>
                <form id="form">
                    <div class="input-group">
                        <label for="text">Descrição</label>
                        <input type="text" id="text" placeholder="Ex: Salário, Aluguer..." autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="amount">Valor (€)</label>
                        <input type="number" id="amount" step="0.01" placeholder="-50.00 ou 1200.00">
                        <small>Use (-) para despesas</small>
                    </div>
                    <button class="btn-primary">Adicionar Transação</button>
                </form>
            </div>

            <div class="card history-container">
                <h3>Histórico Recente</h3>
                <ul id="list" class="transaction-list">
                    </ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
